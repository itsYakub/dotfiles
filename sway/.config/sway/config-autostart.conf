#
# default: mod-key
set $mod    Mod4

# use Mouse+$mod to drag floating windows to their wanted position
floating_modifier $mod

# default: utilities
set $term   kitty
set $menu   wofi --show drun
set $lock   swaylock
set $prtscr grim -g "$(slurp -d)" -

# default: font
font pango:monospace 11

# start sway session
exec dex --autostart --environment sway

# sway deamon timeout using swayidle
# - 300s - lock the screen
# - 600s - suspend the machine
exec swayidle \
	timeout 300 'exec swaylock'	\
	timeout 600 'exec systemctl suspend' \
	before-sleep 'exec swaylock -f'

# set the default wallpaper
output * background  ~/images/wallpaper/1920x1080.png fill #000000

exec gammastep -O 5000
